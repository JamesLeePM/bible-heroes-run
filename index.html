<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#000000" />
    <title>Bible Run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: none;
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #ffd700;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash .cross {
        font-size: clamp(36px, 10vw, 64px);
        margin-bottom: 16px;
      }
      #splash h1 {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(18px, 5vw, 36px);
        color: #1a1a1a;
        text-align: center;
        text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.4);
      }
      #splash-loading {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(8px, 2vw, 12px);
        color: #2d1b6e;
        margin-top: 20px;
        text-align: center;
        max-width: 90vw;
        line-height: 1.6;
      }
      #splash-bar-wrap {
        width: min(320px, 78vw);
        height: 8px;
        background: rgba(0, 0, 0, 0.15);
        border-radius: 4px;
        margin-top: 14px;
        overflow: hidden;
      }
      #splash-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ffd700, #cc8800);
        border-radius: 4px;
        transition: width 0.12s ease-out;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #icon-btn {
        position: fixed;
        bottom: 8px;
        right: 8px;
        z-index: 200;
        font-size: 10px;
        padding: 6px 10px;
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <span class="cross" role="img" aria-label="cross">✝️</span>
      <h1>BIBLE RUN</h1>
      <p id="splash-loading">Loading Bible Adventures...</p>
      <div id="splash-bar-wrap" aria-hidden="true">
        <div id="splash-bar"></div>
      </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <button
      type="button"
      id="icon-btn"
      style="display: none"
      title="Download 1024×1024 app icon"
    >
      Download Icon
    </button>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
